<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — InfraMint</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --white: #ffffff;
            --gray-100: #f7f7f7;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-800: #262626;
            --error: #dc2626;
            --success: #16a34a;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--gray-100);
            color: var(--black);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--black);
            height: 4.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            text-decoration: none;
        }

        .logo-bar {
            width: 3px;
            height: 1.75rem;
            background: var(--white);
        }

        .logo-text {
            font-size: 1.25rem;
            letter-spacing: -0.01em;
        }

        .logo-text span:first-child {
            font-weight: 600;
            color: var(--white);
        }

        .logo-text span:last-child {
            font-weight: 200;
            color: var(--gray-500);
        }

        .nav-link {
            font-size: 0.875rem;
            color: var(--gray-400);
            text-decoration: none;
        }

        .nav-link:hover {
            color: var(--white);
        }

        /* Main */
        .login-container {
            min-height: 100vh;
            padding-top: 4.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 420px;
            margin: 2rem;
            padding: 2.5rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        /* Social */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.875rem;
            font-size: 0.9375rem;
            font-weight: 500;
            font-family: 'Manrope', sans-serif;
            border: 1px solid var(--gray-300);
            background: var(--white);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            border-color: var(--gray-400);
            background: var(--gray-100);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        .divider span {
            padding: 0 1rem;
            font-size: 0.8125rem;
            color: var(--gray-400);
        }

        /* Form */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 0.9375rem;
            font-family: 'Manrope', sans-serif;
            border: 1px solid var(--gray-300);
            background: var(--white);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--black);
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: 'Manrope', sans-serif;
            cursor: pointer;
            border: none;
            background: var(--black);
            color: var(--white);
            margin-top: 0.5rem;
        }

        .btn:hover {
            background: var(--gray-800);
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--error);
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-200);
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        .login-footer a {
            color: var(--black);
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .login-options {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .login-options a {
            font-size: 0.8125rem;
            color: var(--gray-500);
            text-decoration: none;
        }

        .login-options a:hover {
            color: var(--black);
        }

        @media (max-width: 500px) {
            nav { padding: 0 1.5rem; }
            .login-card { margin: 1rem; padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <div class="logo-bar"></div>
            <div class="logo-text">
                <span>Infra</span><span>Mint</span>
            </div>
        </a>
        <a href="index.html" class="nav-link">← Back to Home</a>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">Welcome back</h1>
                <p class="login-subtitle">Sign in to your account</p>
            </div>

            <div class="error-message" id="error-msg"></div>

            <button type="button" class="social-btn" id="google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Continue with Google</span>
            </button>

            <div class="divider"><span>or</span></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Your password" required>
                </div>

                <button type="submit" class="btn">Sign In</button>
            </form>

            <div class="login-footer">
                Don't have an account?<br><br>
                <div class="login-options">
                    <a href="collector-signup.html">Sign up as Collector</a>
                    <span style="color: var(--gray-300);">|</span>
                    <a href="artist-signup.html">Apply as Artist</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function() {
        const SUPABASE_URL = 'https://vyibnkztkacifahhlxof.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5aWJua3p0a2FjaWZhaGhseG9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTE0NzcsImV4cCI6MjA4NDQ4NzQ3N30.k0MGtmRKhQGJ9tX2arw7OUQg1y1SUZP3IBuSkq1E5l4';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('show');
        }

        // Google Sign In
        document.getElementById('google-btn').addEventListener('click', async () => {
            const { error } = await db.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/index.html'
                }
            });
            if (error) showError(error.message);
        });

        // Email Sign In
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await db.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                showError(error.message);
                return;
            }

            // Success - redirect to home
            window.location.href = 'index.html';
        });

        // Check if already logged in
        async function checkAuth() {
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                // Already logged in - redirect to home
                window.location.href = 'index.html';
            }
        }

        checkAuth();
    })();
    </script>

</body>
</html>
