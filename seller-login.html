<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Seller — InfraMint</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Manrope',sans-serif;background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;color:#fff}
        nav{padding:0 3rem;display:flex;justify-content:space-between;align-items:center;height:4.5rem}
        .logo{display:flex;align-items:center;gap:.875rem;text-decoration:none}
        .logo-bar{width:3px;height:1.75rem;background:#fff}
        .logo-text{font-size:1.25rem;letter-spacing:-.01em}
        .logo-text span:first-child{font-weight:600;color:#fff}
        .logo-text span:last-child{font-weight:200;color:#737373}
        .back{font-size:.8rem;color:#737373;text-decoration:none;transition:color .2s}
        .back:hover{color:#fff}
        .container{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
        .card{background:#111;border:1px solid #222;padding:2.5rem;width:100%;max-width:420px}
        .tabs{display:flex;border-bottom:1px solid #222;margin-bottom:2rem}
        .tab{flex:1;text-align:center;padding:.75rem;font-size:.85rem;font-weight:500;color:#737373;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
        .tab.active{color:#fff;border-bottom-color:#c8ff00}
        .tab-content{display:none}
        .tab-content.active{display:block}
        h2{font-size:1.25rem;font-weight:300;letter-spacing:-.02em;margin-bottom:.35rem}
        .sub{font-size:.8rem;color:#737373;margin-bottom:1.5rem;font-weight:300}
        .form-group{margin-bottom:1rem}
        .form-label{display:block;font-size:.75rem;font-weight:500;color:#a3a3a3;margin-bottom:.35rem}
        .form-input{width:100%;padding:.7rem .85rem;font-size:.875rem;font-family:'Manrope',sans-serif;border:1px solid #333;background:#0a0a0a;color:#fff;outline:none;transition:border-color .2s}
        .form-input:focus{border-color:#c8ff00}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
        .btn{width:100%;padding:.8rem;font-size:.875rem;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;border:none;transition:all .2s;margin-top:.5rem}
        .btn-primary{background:#c8ff00;color:#0a0a0a}
        .btn-primary:hover{background:#d4ff33}
        .btn-google{background:none;border:1px solid #333;color:#fff;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:1rem}
        .btn-google:hover{border-color:#c8ff00}
        .divider{text-align:center;color:#525252;font-size:.75rem;margin:1rem 0;position:relative}
        .divider::before,.divider::after{content:'';position:absolute;top:50%;width:calc(50% - 1.5rem);height:1px;background:#222}
        .divider::before{left:0}
        .divider::after{right:0}
        .msg{display:none;padding:.6rem .85rem;font-size:.8rem;margin-bottom:1rem}
        .msg.show{display:block}
        .msg.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#ef4444}
        .msg.success{background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.3);color:#22c55e}
        @media(max-width:480px){nav{padding:0 1.5rem}.card{padding:1.5rem}.form-row{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo"><div class="logo-bar"></div><div class="logo-text"><span>Infra</span><span>Mint</span></div></a>
        <a href="index.html" class="back">← Back to InfraMint</a>
    </nav>
    <div class="container">
        <div class="card">
            <div class="tabs">
                <div class="tab active" data-tab="signin">Sign In</div>
                <div class="tab" data-tab="signup">Create Account</div>
            </div>

            <!-- Sign In -->
            <div class="tab-content active" id="tab-signin">
                <h2>Private Seller</h2>
                <p class="sub">Sign in to manage your exhibitions and sales</p>
                <div id="msg-signin" class="msg"></div>
                <button class="btn btn-google" id="google-signin">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Continue with Google
                </button>
                <div class="divider">or</div>
                <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="si-email" placeholder="your@email.com"></div>
                <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="si-password"></div>
                <button class="btn btn-primary" id="si-btn">Sign In</button>
            </div>

            <!-- Sign Up -->
            <div class="tab-content" id="tab-signup">
                <h2>Become a Private Seller</h2>
                <p class="sub">Create an account to showcase and sell artwork through virtual exhibitions</p>
                <div id="msg-signup" class="msg"></div>
                <button class="btn btn-google" id="google-signup">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Sign up with Google
                </button>
                <div class="divider">or</div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-input" id="su-first"></div>
                    <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-input" id="su-last"></div>
                </div>
                <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="su-email" placeholder="your@email.com"></div>
                <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="su-password" placeholder="Min 6 characters"></div>
                <div class="form-group"><label class="form-label">Phone (optional)</label><input type="text" class="form-input" id="su-phone" placeholder="+971 ..."></div>
                <button class="btn btn-primary" id="su-btn">Create Account</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        var db = supabase.createClient('https://vyibnkztkacifahhlxof.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5aWJua3p0a2FjaWZhaGhseG9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTE0NzcsImV4cCI6MjA4NDQ4NzQ3N30.k0MGtmRKhQGJ9tX2arw7OUQg1y1SUZP3IBuSkq1E5l4');

        function showMsg(id, text, type) {
            var el = document.getElementById(id);
            el.textContent = text; el.className = 'msg show ' + type;
        }

        // Tabs
        document.querySelectorAll('.tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });

        // Google Sign In
        document.getElementById('google-signin').addEventListener('click', async function() {
            await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/seller-login.html' } });
        });
        document.getElementById('google-signup').addEventListener('click', async function() {
            await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/seller-login.html' } });
        });

        // Email Sign In
        document.getElementById('si-btn').addEventListener('click', async function() {
            var email = document.getElementById('si-email').value.trim();
            var password = document.getElementById('si-password').value;
            if (!email || !password) { showMsg('msg-signin', 'Please fill in all fields.', 'error'); return; }
            this.textContent = 'Signing in...'; this.disabled = true;
            var { data, error } = await db.auth.signInWithPassword({ email: email, password: password });
            if (error) { showMsg('msg-signin', error.message, 'error'); this.textContent = 'Sign In'; this.disabled = false; return; }
            // Check for seller profile
            var { data: seller } = await db.from('private_sellers').select('id').eq('user_id', data.user.id).maybeSingle();
            if (!seller) {
                // Auto-create from existing auth
                await db.from('private_sellers').upsert({ user_id: data.user.id, email: data.user.email, first_name: data.user.user_metadata?.first_name || '', last_name: data.user.user_metadata?.last_name || '' }, { onConflict: 'user_id' });
            }
            window.location.href = 'seller-dashboard.html';
        });

        // Email Sign Up
        document.getElementById('su-btn').addEventListener('click', async function() {
            var first = document.getElementById('su-first').value.trim();
            var last = document.getElementById('su-last').value.trim();
            var email = document.getElementById('su-email').value.trim();
            var password = document.getElementById('su-password').value;
            if (!first || !email || !password) { showMsg('msg-signup', 'Please fill in required fields.', 'error'); return; }
            if (password.length < 6) { showMsg('msg-signup', 'Password must be at least 6 characters.', 'error'); return; }
            this.textContent = 'Creating...'; this.disabled = true;
            var { data, error } = await db.auth.signUp({ email: email, password: password, options: { data: { first_name: first, last_name: last } } });
            if (error) { showMsg('msg-signup', error.message, 'error'); this.textContent = 'Create Account'; this.disabled = false; return; }
            // Create seller profile
            if (data.user) {
                await db.from('private_sellers').insert({ user_id: data.user.id, email: email, first_name: first, last_name: last, phone: document.getElementById('su-phone').value.trim() });
            }
            if (data.session) {
                window.location.href = 'seller-dashboard.html';
            } else {
                showMsg('msg-signup', 'Check your email to confirm your account, then sign in.', 'success');
                this.textContent = 'Create Account'; this.disabled = false;
            }
        });

        // Auto-redirect if already logged in
        (async function() {
            var { data: { session } } = await db.auth.getSession();
            if (session) {
                var { data: seller } = await db.from('private_sellers').select('id').eq('user_id', session.user.id).maybeSingle();
                if (seller) { window.location.href = 'seller-dashboard.html'; return; }
                // If logged in but not a seller, auto-create profile
                await db.from('private_sellers').upsert({ user_id: session.user.id, email: session.user.email, first_name: session.user.user_metadata?.first_name || '', last_name: session.user.user_metadata?.last_name || '' }, { onConflict: 'user_id' });
                window.location.href = 'seller-dashboard.html';
            }
        })();
    </script>
</body>
</html>
