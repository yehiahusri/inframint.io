<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collector Portal — InfraMint</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #000000;
            --white: #ffffff;
            --gray-100: #f7f7f7;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-800: #262626;
            --error: #dc2626;
            --success: #16a34a;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--gray-100);
            color: var(--black);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            padding: 0 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--black);
            height: 4.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            text-decoration: none;
        }

        .logo-bar {
            width: 3px;
            height: 1.75rem;
            background: var(--white);
        }

        .logo-text {
            font-size: 1.25rem;
            letter-spacing: -0.01em;
        }

        .logo-text span:first-child {
            font-weight: 600;
            color: var(--white);
        }

        .logo-text span:last-child {
            font-weight: 200;
            color: var(--gray-500);
        }

        .nav-link {
            font-size: 0.875rem;
            color: var(--gray-400);
            text-decoration: none;
        }

        .nav-link:hover {
            color: var(--white);
        }

        /* Main */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background: var(--white);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-badge {
            display: inline-block;
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--gray-500);
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-400);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
        }

        .tab:hover { color: var(--gray-600); }

        .tab.active {
            color: var(--black);
            border-bottom-color: var(--black);
        }

        /* Social */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.875rem;
            font-size: 0.9375rem;
            font-weight: 500;
            font-family: 'Manrope', sans-serif;
            border: 1px solid var(--gray-300);
            background: var(--white);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            border-color: var(--gray-400);
            background: var(--gray-100);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        .divider span {
            padding: 0 1rem;
            font-size: 0.8125rem;
            color: var(--gray-400);
        }

        /* Form */
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group { margin-bottom: 1rem; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .form-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 0.9375rem;
            font-family: 'Manrope', sans-serif;
            border: 1px solid var(--gray-300);
            background: var(--white);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--black);
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: 'Manrope', sans-serif;
            cursor: pointer;
            border: none;
            background: var(--black);
            color: var(--white);
            margin-top: 0.5rem;
        }

        .btn:hover { background: var(--gray-800); }

        .message {
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }

        .message.show { display: block; }

        .message.error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--error);
        }

        .message.success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: var(--success);
        }

        /* Footer links */
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-200);
            font-size: 0.8125rem;
            color: var(--gray-500);
        }

        .auth-footer a {
            color: var(--black);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover { text-decoration: underline; }

        /* Page Footer */
        .page-footer {
            padding: 1.5rem;
            text-align: center;
            border-top: 1px solid var(--gray-200);
        }

        .gallery-owner-link {
            font-size: 0.75rem;
            color: var(--gray-400);
            text-decoration: none;
            transition: color 0.2s;
        }

        .gallery-owner-link:hover {
            color: var(--gray-600);
        }

        @media (max-width: 500px) {
            nav { padding: 0 1.5rem; }
            .auth-card { padding: 1.5rem; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <div class="logo-bar"></div>
            <div class="logo-text">
                <span>Infra</span><span>Mint</span>
            </div>
        </a>
        <a href="index.html" class="nav-link">← Back to Home</a>
    </nav>

    <div class="main-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-badge">Collector Portal</div>
                <h1 class="auth-title">Welcome, Collector</h1>
                <p class="auth-subtitle">Sign in to explore and collect art</p>
            </div>

            <div class="tabs">
                <div class="tab active" data-tab="signin">Sign In</div>
                <div class="tab" data-tab="register">Register</div>
            </div>

            <div class="message" id="message"></div>

            <!-- Google Button -->
            <button type="button" class="social-btn" id="google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Continue with Google</span>
            </button>

            <div class="divider"><span>or</span></div>

            <!-- Sign In Form -->
            <form class="auth-form active" id="signin-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="signin-email" placeholder="collector@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="signin-password" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="register-form">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-input" id="reg-firstname" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-input" id="reg-lastname" placeholder="Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="reg-email" placeholder="collector@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="reg-password" placeholder="Minimum 8 characters" required minlength="8">
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>

            <div class="auth-footer">
                Want to sell your art?<br>
                <a href="artist-login.html">Sign in as Artist →</a>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        <a href="partner-login.html" class="gallery-owner-link">Partner Login</a> · <a href="admin.html" class="gallery-owner-link">Gallery Owner</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function() {
        const SUPABASE_URL = 'https://vyibnkztkacifahhlxof.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5aWJua3p0a2FjaWZhaGhseG9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTE0NzcsImV4cCI6MjA4NDQ4NzQ3N30.k0MGtmRKhQGJ9tX2arw7OUQg1y1SUZP3IBuSkq1E5l4';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                
                const formId = tab.dataset.tab === 'signin' ? 'signin-form' : 'register-form';
                document.getElementById(formId).classList.add('active');
                clearMessage();
            });
        });

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message show ' + type;
        }

        function clearMessage() {
            document.getElementById('message').className = 'message';
        }

        // Save collector to database
        async function saveCollector(user, firstName, lastName, email) {
            const { error } = await db.from('collectors').insert({
                user_id: user.id,
                email: email,
                first_name: firstName,
                last_name: lastName
            });
            
            // Ignore duplicate errors
            if (error && error.code !== '23505') {
                console.error('Error saving collector:', error);
            }
        }

        // Google Sign In
        document.getElementById('google-btn').addEventListener('click', async () => {
            const { error } = await db.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/collector-login.html?auth=google'
                }
            });
            if (error) showMessage(error.message, 'error');
        });

        // Email Sign In
        document.getElementById('signin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            const { data, error } = await db.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                showMessage(error.message, 'error');
                return;
            }

            // Success - redirect to gallery/home
            window.location.href = 'collector-dashboard.html';
        });

        // Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('reg-firstname').value;
            const lastName = document.getElementById('reg-lastname').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            const { data, error } = await db.auth.signUp({
                email: email,
                password: password,
                options: {
                    emailRedirectTo: window.location.origin + '/collector-login.html',
                    data: { first_name: firstName, last_name: lastName, user_type: 'collector' }
                }
            });

            if (error) { showMessage(error.message, 'error'); return; }

            if (data.user) {
                await saveCollector(data.user, firstName, lastName, email);
            }

            if (data.session) {
                window.location.href = 'collector-dashboard.html';
            } else {
                showMessage('Account created! Check your email for a verification link, then come back and sign in.', 'success');
            }
        });

        // Check auth on load
        async function checkAuth() {
            const { data: { session } } = await db.auth.getSession();
            const urlParams = new URLSearchParams(window.location.search);

            if (session) {
                const user = session.user;
                const meta = user.user_metadata || {};
                
                const pending = JSON.parse(localStorage.getItem('inframint_collector_pending') || '{}');
                const names = (meta.full_name || '').split(' ');
                const firstName = pending.first_name || meta.first_name || names[0] || '';
                const lastName = pending.last_name || meta.last_name || names.slice(1).join(' ') || '';

                // Always ensure collector profile exists
                await saveCollector(user, firstName, lastName, user.email);
                localStorage.removeItem('inframint_collector_pending');
                window.location.href = 'collector-dashboard.html';
            }
        }

        checkAuth();
    })();
    </script>

</body>
</html>
