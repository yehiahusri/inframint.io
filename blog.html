<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal — InfraMint</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--black:#000;--white:#fff;--g100:#f7f7f7;--g200:#e5e5e5;--g300:#d4d4d4;--g400:#a3a3a3;--g500:#737373;--g600:#525252;--g800:#262626}
        body{font-family:'Manrope',sans-serif;background:var(--g100);color:var(--black);-webkit-font-smoothing:antialiased}

        nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 3rem;display:flex;justify-content:space-between;align-items:center;background:var(--black);height:4.5rem}
        .logo{display:flex;align-items:center;gap:.875rem;text-decoration:none}
        .logo-bar{width:3px;height:1.75rem;background:var(--white)}
        .logo-text{font-size:1.25rem;letter-spacing:-.01em}
        .logo-text span:first-child{font-weight:600;color:var(--white)}
        .logo-text span:last-child{font-weight:200;color:var(--g500)}
        .nav-center{display:flex;gap:2.5rem;align-items:center}
        .nav-center a{font-size:.9375rem;font-weight:400;color:var(--g400);text-decoration:none;transition:color .2s}
        .nav-center a:hover,.nav-center a.active{color:var(--white)}
        .nav-right{display:flex;gap:1.5rem;align-items:center}
        .nav-login{font-size:.875rem;font-weight:400;color:var(--g400);text-decoration:none;transition:color .2s}
        .nav-login:hover{color:var(--white)}

        .hamburger{display:none;background:none;border:none;cursor:pointer;padding:.25rem}
        .mobile-dropdown{display:none}
        @media(max-width:1200px){
            .nav-center{display:none!important}
            .nav-right{display:none!important}
            .hamburger{display:block}
            .mobile-dropdown{display:none;position:absolute;top:4.5rem;left:0;right:0;background:var(--black);padding:1rem 2rem 1.5rem;flex-direction:column;border-top:1px solid #222}
            .mobile-dropdown.open{display:flex}
            .mobile-dropdown a{font-size:.9375rem;color:var(--g400);text-decoration:none;padding:.6rem 0;border-bottom:1px solid #1a1a1a;transition:color .2s}
            .mobile-dropdown a:hover{color:var(--white)}
            .mobile-dropdown a:last-child{border-bottom:none}
        }

        /* Hero / Header */
        .blog-header{padding:7rem 3rem 2rem;max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end}
        .blog-title{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:400;letter-spacing:-.04em;line-height:1}
        .blog-title em{font-style:italic;font-weight:400}
        .blog-subtitle{font-size:.875rem;color:var(--g500);font-weight:300}

        /* Category filters */
        .blog-filters{padding:1rem 3rem;max-width:1200px;margin:0 auto;display:flex;gap:.4rem;flex-wrap:wrap;border-bottom:1px solid var(--g200);padding-bottom:1.5rem}
        .bf{font-family:'Manrope',sans-serif;font-size:.7rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:.4rem 1rem;border:1px solid var(--g300);background:var(--white);color:var(--g600);cursor:pointer;transition:all .15s}
        .bf:hover{border-color:var(--black);color:var(--black)}
        .bf.active{background:var(--black);color:var(--white);border-color:var(--black)}

        /* Featured post */
        .featured-post{max-width:1200px;margin:2rem auto 0;padding:0 3rem}
        .fp-card{display:grid;grid-template-columns:1.2fr .8fr;background:var(--white);cursor:pointer;transition:box-shadow .3s}
        .fp-card:hover{box-shadow:0 8px 40px rgba(0,0,0,.08)}
        .fp-img{aspect-ratio:16/10;overflow:hidden;background:var(--g200)}
        .fp-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
        .fp-card:hover .fp-img img{transform:scale(1.03)}
        .fp-content{padding:2.5rem;display:flex;flex-direction:column;justify-content:center}
        .fp-cat{font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--g400);margin-bottom:.75rem}
        .fp-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;line-height:1.2;letter-spacing:-.02em;margin-bottom:.75rem}
        .fp-excerpt{font-size:.9rem;color:var(--g500);font-weight:300;line-height:1.7;margin-bottom:1.5rem}
        .fp-meta{font-size:.75rem;color:var(--g400);margin-top:auto}

        /* Posts grid */
        .posts-section{max-width:1200px;margin:0 auto;padding:2.5rem 3rem 4rem}
        .posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}

        .post-card{background:var(--white);cursor:pointer;transition:box-shadow .3s}
        .post-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.06)}
        .post-img{aspect-ratio:4/3;overflow:hidden;background:var(--g200);position:relative}
        .post-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
        .post-card:hover .post-img img{transform:scale(1.03)}
        .post-cat-tag{position:absolute;top:.75rem;left:.75rem;font-size:.55rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.2rem .6rem;background:var(--white);color:var(--g600)}
        .post-body{padding:1.25rem}
        .post-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:400;line-height:1.3;letter-spacing:-.01em;margin-bottom:.5rem}
        .post-excerpt{font-size:.8rem;color:var(--g500);font-weight:300;line-height:1.6;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
        .post-meta{font-size:.7rem;color:var(--g400);display:flex;justify-content:space-between}

        /* Two-image layout card */
        .post-card.dual .post-img{display:grid;grid-template-columns:1fr 1fr;gap:2px}
        .post-card.dual .post-img img{aspect-ratio:auto}

        /* Article view */
        #article-view{display:none}
        .article-back{display:inline-flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--g500);text-decoration:none;padding:6.5rem 3rem 1rem;max-width:900px;margin:0 auto;display:block;transition:color .2s;cursor:pointer;background:none;border:none;font-family:'Manrope',sans-serif}
        .article-back:hover{color:var(--black)}
        .article-hero{max-width:900px;margin:0 auto;padding:0 3rem}
        .article-hero-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--g200)}
        .article-hero-dual{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
        .article-hero-dual img{width:100%;aspect-ratio:1;object-fit:cover}
        .article-content{max-width:680px;margin:0 auto;padding:2rem 3rem 4rem}
        .article-cat{font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--g400);margin-bottom:.5rem}
        .article-title{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:400;line-height:1.15;letter-spacing:-.03em;margin-bottom:.75rem}
        .article-meta{font-size:.8rem;color:var(--g400);margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--g200)}
        .article-body{font-size:1rem;color:var(--g600);font-weight:300;line-height:1.9}
        .article-body p{margin-bottom:1.5rem}

        /* Empty */
        .empty-blog{text-align:center;padding:6rem 2rem;grid-column:1/-1}
        .empty-blog-title{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:.5rem}
        .empty-blog-text{font-size:.9rem;color:var(--g500);font-weight:300}

        /* Footer */
        footer{border-top:1px solid var(--g200);padding:3rem;display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}
        .footer-logo{display:flex;align-items:center;gap:.75rem}
        .footer-bar{width:2px;height:1.25rem;background:var(--black)}
        .footer-text{font-size:1rem}
        .footer-text span:first-child{font-weight:600}
        .footer-text span:last-child{font-weight:200;color:var(--g400)}
        .footer-links{display:flex;gap:2rem}
        .footer-links a{font-size:.8125rem;color:var(--g500);text-decoration:none;transition:color .2s}
        .footer-links a:hover{color:var(--black)}
        .footer-copy{font-size:.75rem;color:var(--g400)}

        @media(max-width:900px){
            .blog-header{padding:6rem 1.5rem 1.5rem;flex-direction:column;align-items:flex-start;gap:.5rem}
            .blog-title{font-size:2.25rem}
            .blog-filters{padding:1rem 1.5rem}
            .featured-post{padding:0 1.5rem}
            .fp-card{grid-template-columns:1fr}
            .fp-content{padding:1.5rem}
            .fp-title{font-size:1.5rem}
            .posts-section{padding:1.5rem}
            .posts-grid{grid-template-columns:1fr}
            .article-back{padding:6rem 1.5rem .75rem}
            .article-hero{padding:0 1.5rem}
            .article-content{padding:1.5rem}
            .article-title{font-size:1.75rem}
            footer{flex-direction:column;gap:1.5rem;padding:2rem 1.5rem;text-align:center}
            .footer-links{flex-wrap:wrap;justify-content:center;gap:1rem}
        }
        @media(max-width:600px){
            nav{padding:0 1.5rem}
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo"><div class="logo-bar"></div><div class="logo-text"><span>Infra</span><span>Mint</span></div></a>
        <button class="hamburger" onclick="document.getElementById('mob').classList.toggle('open')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="mobile-dropdown" id="mob" onclick="this.classList.remove('open')">
            <a href="gallery.html">Gallery</a><a href="artists.html">Artists</a><a href="blog.html">Journal</a><a href="about.html">About</a>
            <a href="artist-login.html">Artist Login</a><a href="collector-login.html">Collector Login</a><a href="partner-login.html">Partner Login</a>
        </div>
        <div class="nav-center">
            <a href="gallery.html">Gallery</a>
            <a href="artists.html">Artists</a>
            <a href="blog.html" class="active">Journal</a>
            <a href="index.html#how">How It Works</a>
            <a href="about.html">About</a>
        </div>
        <div class="nav-right">
            <a href="artist-login.html" class="nav-login">Artist Login</a>
            <a href="collector-login.html" class="nav-login">Collector Login</a>
        </div>
    </nav>

    <!-- List view -->
    <div id="list-view">
        <div class="blog-header">
            <div>
                <h1 class="blog-title">The <em>Journal</em></h1>
            </div>
            <div class="blog-subtitle">Stories, news & insights from the art world</div>
        </div>

        <div class="blog-filters" id="filters">
            <button class="bf active" data-cat="all">All</button>
            <button class="bf" data-cat="news">News</button>
            <button class="bf" data-cat="artist-spotlight">Artist Spotlight</button>
            <button class="bf" data-cat="behind-the-scenes">Behind the Scenes</button>
            <button class="bf" data-cat="collecting">Collecting</button>
            <button class="bf" data-cat="events">Events</button>
        </div>

        <div class="featured-post" id="featured-post"></div>
        <div class="posts-section"><div class="posts-grid" id="posts-grid"><div class="empty-blog"><div class="empty-blog-title">Loading...</div></div></div></div>
    </div>

    <!-- Article view -->
    <div id="article-view">
        <button class="article-back" id="article-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Back to Journal
        </button>
        <div class="article-hero" id="article-hero"></div>
        <div class="article-content">
            <div class="article-cat" id="art-cat"></div>
            <h1 class="article-title" id="art-title"></h1>
            <div class="article-meta" id="art-meta"></div>
            <div class="article-body" id="art-body"></div>
        </div>
    </div>

    <footer>
        <div class="footer-logo"><div class="footer-bar"></div><div class="footer-text"><span>Infra</span><span>Mint</span></div></div>
        <div class="footer-links">
            <a href="gallery.html">Gallery</a><a href="artists.html">Artists</a><a href="blog.html">Journal</a><a href="about.html">About</a>
        </div>
        <div class="footer-copy">© 2026 InfraMint · <a href="admin.html" style="color:var(--g400);text-decoration:none;font-size:.75rem">Gallery Owner</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    const db=supabase.createClient('https://vyibnkztkacifahhlxof.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5aWJua3p0a2FjaWZhaGhseG9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MTE0NzcsImV4cCI6MjA4NDQ4NzQ3N30.k0MGtmRKhQGJ9tX2arw7OUQg1y1SUZP3IBuSkq1E5l4');
    let posts=[],filter='all';
    const catLabels={news:'News','artist-spotlight':'Artist Spotlight','behind-the-scenes':'Behind the Scenes',collecting:'Collecting',events:'Events'};
    const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function fmtDate(d){if(!d)return'';var x=new Date(d);return monthNames[x.getMonth()]+' '+x.getDate()+', '+x.getFullYear()}

    async function loadPosts(){
        var{data}=await db.from('blog_posts').select('*').eq('published',true).order('published_at',{ascending:false});
        posts=data||[];
        renderPosts();
    }

    function renderPosts(){
        var filtered=filter==='all'?posts:posts.filter(function(p){return p.category===filter});
        var featEl=document.getElementById('featured-post');
        var gridEl=document.getElementById('posts-grid');

        if(!filtered.length){
            featEl.innerHTML='';
            gridEl.innerHTML='<div class="empty-blog"><div class="empty-blog-title">No posts yet</div><div class="empty-blog-text">Check back soon for stories from the art world.</div></div>';
            return;
        }

        // First post = featured
        var feat=filtered[0];
        var rest=filtered.slice(1);

        featEl.innerHTML=
            '<div class="fp-card" onclick="openPost(\''+feat.id+'\')">' +
                '<div class="fp-img">'+(feat.image_url?'<img src="'+feat.image_url+'" alt="'+feat.title+'">':'')+'</div>' +
                '<div class="fp-content">' +
                    '<div class="fp-cat">'+(catLabels[feat.category]||feat.category||'')+'</div>' +
                    '<div class="fp-title">'+feat.title+'</div>' +
                    '<div class="fp-excerpt">'+(feat.excerpt||'')+'</div>' +
                    '<div class="fp-meta">'+(feat.author||'InfraMint')+' · '+fmtDate(feat.published_at)+'</div>' +
                '</div>' +
            '</div>';

        if(!rest.length){gridEl.innerHTML='';return}

        gridEl.innerHTML='';
        rest.forEach(function(p){
            var isDual=p.layout==='dual'&&p.image2_url;
            var card=document.createElement('div');
            card.className='post-card'+(isDual?' dual':'');
            card.onclick=function(){openPost(p.id)};

            var imgHtml='';
            if(isDual){
                imgHtml='<div class="post-img"><img src="'+p.image_url+'" alt=""><img src="'+p.image2_url+'" alt=""></div>';
            } else {
                imgHtml='<div class="post-img">'+(p.image_url?'<img src="'+p.image_url+'" alt="'+p.title+'">':'')+'<div class="post-cat-tag">'+(catLabels[p.category]||p.category||'')+'</div></div>';
            }

            card.innerHTML=imgHtml+
                '<div class="post-body">' +
                    '<div class="post-title">'+p.title+'</div>' +
                    '<div class="post-excerpt">'+(p.excerpt||'')+'</div>' +
                    '<div class="post-meta"><span>'+(p.author||'InfraMint')+'</span><span>'+fmtDate(p.published_at)+'</span></div>' +
                '</div>';
            gridEl.appendChild(card);
        });
    }

    function openPost(id){
        var p=posts.find(function(x){return x.id===id});
        if(!p)return;

        document.getElementById('list-view').style.display='none';
        document.getElementById('article-view').style.display='block';
        window.scrollTo(0,0);

        var heroEl=document.getElementById('article-hero');
        if(p.layout==='dual'&&p.image2_url){
            heroEl.innerHTML='<div class="article-hero-dual"><img src="'+p.image_url+'" alt=""><img src="'+p.image2_url+'" alt=""></div>';
        } else if(p.image_url){
            heroEl.innerHTML='<img src="'+p.image_url+'" alt="'+p.title+'" class="article-hero-img">';
        } else {
            heroEl.innerHTML='';
        }

        document.getElementById('art-cat').textContent=catLabels[p.category]||p.category||'';
        document.getElementById('art-title').textContent=p.title;
        document.getElementById('art-meta').textContent=(p.author||'InfraMint')+' · '+fmtDate(p.published_at);

        // Convert body text to paragraphs
        var bodyHtml=p.body?p.body.split('\n').filter(function(l){return l.trim()}).map(function(l){return '<p>'+l+'</p>'}).join(''):'';
        document.getElementById('art-body').innerHTML=bodyHtml;
    }

    document.getElementById('article-back').onclick=function(){
        document.getElementById('article-view').style.display='none';
        document.getElementById('list-view').style.display='block';
        window.scrollTo(0,0);
    };

    document.getElementById('filters').onclick=function(e){
        if(!e.target.classList.contains('bf'))return;
        document.querySelectorAll('.bf').forEach(function(b){b.classList.remove('active')});
        e.target.classList.add('active');
        filter=e.target.dataset.cat;
        renderPosts();
    };

    loadPosts();
    </script>
</body>
</html>
